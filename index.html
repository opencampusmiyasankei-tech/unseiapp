<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#FF8FAB" />
<title>ぜんぶいい日うらない 🌈</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hachi+Maru+Pop&family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet" />
<style>
/* ===== カラーパレット（マシュマロパステル） ===== */
:root{
  --cream:#FFF9EE;
  --sky:#BDE0FE;     /* そらいろ */
  --pink:#FFC8DD;    /* ももいろ */
  --lav:#CDB4DB;     /* ラベンダー */
  --mint:#B8F2E6;    /* ミント */
  --lemon:#FFF3B0;   /* レモン */
  --accent:#FF8FAB;  /* こいめのピンク */
  --ink:#5C5470;     /* やわらかい文字色 */
  --line:#F0E3EF;    /* うすい線 */
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{
  font-family:"Zen Maru Gothic","Hiragino Maru Gothic ProN","Yu Gothic",sans-serif;
  color:var(--ink);
  background:linear-gradient(170deg,#FFF9EE 0%,#FFEAF3 40%,#E8F4FF 75%,#EFFCF6 100%);
  min-height:100vh;
  display:flex;justify-content:center;align-items:flex-start;
  padding:28px 16px 60px;
  overflow-x:hidden;
}
button{font-family:inherit;cursor:pointer;}
button:focus-visible,input:focus-visible{outline:3px solid var(--sky);outline-offset:2px;}

/* ===== 背景にただよう、やわらかいもの ===== */
.float-emoji{
  position:fixed;z-index:0;opacity:.5;user-select:none;pointer-events:none;
  animation:floaty var(--dur,9s) ease-in-out infinite alternate;
}
@keyframes floaty{
  from{transform:translateY(0) rotate(-6deg);}
  to{transform:translateY(-16px) rotate(6deg);}
}

/* ===== カード ===== */
.card{
  position:relative;z-index:1;
  width:100%;max-width:430px;
  background:#fff;
  border:2.5px solid var(--line);
  border-radius:32px;
  box-shadow:0 14px 30px rgba(186,150,180,.28);
  padding:28px 22px 22px;
  animation:cardIn .5s cubic-bezier(.2,1.1,.4,1);
}
@keyframes cardIn{from{transform:translateY(18px) scale(.97);opacity:0;}to{transform:none;opacity:1;}}
.hidden{display:none;}

/* ===== タイトルまわり ===== */
.badge{
  display:inline-block;
  background:var(--lemon);
  border:2px solid #F1DE8C;border-radius:999px;
  padding:4px 14px;font-size:12px;font-weight:900;
  margin-bottom:12px;
}
.title{
  font-family:"Hachi Maru Pop","Zen Maru Gothic",sans-serif;
  font-size:31px;line-height:1.3;letter-spacing:.01em;
  background:linear-gradient(120deg,var(--accent),var(--lav) 55%,#7EB8F2);
  -webkit-background-clip:text;background-clip:text;
  color:transparent;
  margin-bottom:8px;
}
.tagline{
  display:inline-block;
  font-size:13px;font-weight:900;line-height:1.8;
  background:linear-gradient(transparent 62%, var(--lemon) 62%);
  margin-bottom:18px;
}

/* ===== 入力まわり ===== */
.label{font-size:14px;font-weight:900;margin:16px 0 8px;display:block;}
.name-input{
  width:100%;font-size:16px;font-weight:700;color:var(--ink);
  border:2.5px solid var(--line);border-radius:18px;
  padding:12px 16px;background:#FFFDF8;
  transition:border-color .15s, box-shadow .15s;
}
.name-input::placeholder{color:#CBBFCF;font-weight:500;}
.name-input:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(255,143,171,.18);}

.charm-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;}
.charm-btn{
  background:#FFFDF8;border:2.5px solid var(--line);border-radius:20px;
  padding:11px 4px 9px;text-align:center;
  transition:transform .12s, background .12s, border-color .12s, box-shadow .12s;
}
.charm-btn .emoji{font-size:29px;display:block;line-height:1.2;}
.charm-btn .name{font-size:11.5px;font-weight:900;color:var(--ink);}
.charm-btn:active{transform:scale(.96);}
.charm-btn.selected{
  background:#FFF0F6;border-color:var(--accent);
  box-shadow:0 0 0 4px rgba(255,143,171,.16);
  animation:pop .28s cubic-bezier(.2,1.6,.4,1);
}
@keyframes pop{0%{transform:scale(.85);}60%{transform:scale(1.08);}100%{transform:scale(1);}}

.error{
  display:none;margin-top:7px;
  font-size:12.5px;font-weight:900;color:#E8467C;
}
.error.show{display:block;}
.shake{animation:shake .4s;}
@keyframes shake{
  0%,100%{transform:translateX(0);}
  20%{transform:translateX(-6px);}40%{transform:translateX(6px);}
  60%{transform:translateX(-4px);}80%{transform:translateX(4px);}
}

/* ===== みるボタン ===== */
.go-btn{
  width:100%;margin-top:22px;
  font-family:"Hachi Maru Pop","Zen Maru Gothic",sans-serif;
  font-size:19px;color:#fff;letter-spacing:.04em;
  background:linear-gradient(120deg,var(--accent),var(--lav));
  border:none;border-radius:999px;
  padding:15px 10px;
  box-shadow:0 8px 18px rgba(255,143,171,.45);
  text-shadow:0 1px 2px rgba(92,84,112,.25);
  animation:breathe 2.6s ease-in-out infinite;
  transition:transform .12s, box-shadow .12s;
}
.go-btn:active{transform:scale(.97);box-shadow:0 4px 10px rgba(255,143,171,.4);animation:none;}
.go-btn.again{background:linear-gradient(120deg,#7EC8E3,var(--lav));box-shadow:0 8px 18px rgba(126,200,227,.4);animation:none;margin-top:20px;}
@keyframes breathe{0%,100%{transform:scale(1);}50%{transform:scale(1.02);}}

.credit{
  margin-top:16px;text-align:center;
  font-size:11.5px;font-weight:700;color:#B3A6B8;
}
.credit small{display:block;margin-top:2px;font-size:10.5px;font-weight:500;}

/* ===== さがしている画面 ===== */
#loadingCard{text-align:center;padding:54px 22px;}
.loading-emoji{font-size:62px;animation:breatheBig 1.1s ease-in-out infinite alternate;}
@keyframes breatheBig{from{transform:scale(1) translateY(0);}to{transform:scale(1.12) translateY(-8px);}}
.loading-text{
  margin-top:18px;font-family:"Hachi Maru Pop",sans-serif;
  font-size:16.5px;color:var(--accent);
}
.dots span{animation:blink 1.2s infinite;}
.dots span:nth-child(2){animation-delay:.2s;}
.dots span:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,100%{opacity:.2;}50%{opacity:1;}}

/* ===== 結果画面 ===== */
#resultCard{text-align:center;}
.result-date{font-size:12px;font-weight:700;color:#B3A6B8;}
.result-name{
  font-family:"Hachi Maru Pop",sans-serif;
  font-size:17.5px;margin:4px 0 16px;
}
.theme-badge{
  display:inline-block;
  font-family:"Hachi Maru Pop",sans-serif;
  font-size:27px;line-height:1.3;color:var(--ink);
  padding:20px 28px;
  border:3px solid #fff;border-radius:28px;
  box-shadow:0 10px 22px rgba(186,150,180,.3);
  animation:bloomIn .6s cubic-bezier(.2,1.3,.4,1), floatSoft 3s ease-in-out .6s infinite alternate;
}
@keyframes bloomIn{
  0%{transform:scale(.5);opacity:0;}
  60%{transform:scale(1.07);opacity:1;}
  100%{transform:scale(1);}
}
@keyframes floatSoft{from{transform:translateY(0);}to{transform:translateY(-6px);}}
.fortune-msg{font-size:14.5px;font-weight:700;line-height:1.85;margin-top:16px;}

.hint-box{
  margin-top:16px;padding:12px 14px;text-align:left;
  background:#F4FFFB;border:2.5px dashed #8FDCC8;border-radius:16px;
}
.charm-box{
  margin-top:10px;padding:12px 14px;text-align:left;
  background:#FFFBEB;border:2.5px dashed #F1DE8C;border-radius:16px;
}
.box-label{font-size:11.5px;font-weight:900;color:#8FA398;margin-bottom:4px;}
.charm-box .box-label{color:#B3A05E;}
.box-text{font-size:13px;font-weight:700;line-height:1.75;}

.lucky-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;}
.lucky-box{
  border:2.5px solid var(--line);border-radius:18px;
  background:#FFFDF8;padding:12px 8px;
}
.lucky-label{font-size:11.5px;font-weight:900;color:#B3A6B8;margin-bottom:5px;}
.lucky-value{font-size:13.5px;font-weight:900;line-height:1.5;}
.color-dot{
  display:inline-block;width:14px;height:14px;border-radius:50%;
  border:2px solid #E4D6E6;vertical-align:-2px;margin-right:5px;
}

.philosophy{
  margin-top:18px;
  font-size:12px;font-weight:900;line-height:1.8;color:#9C8FA3;
}

/* ===== はなびら・きらきらのお祝い ===== */
.confetti{
  position:fixed;top:-8vh;z-index:50;pointer-events:none;user-select:none;
  animation:fallSoft linear forwards;
}
@keyframes fallSoft{
  to{transform:translateY(115vh) rotate(360deg);opacity:.55;}
}

/* ===== モーション軽減設定に対応 ===== */
@media (prefers-reduced-motion: reduce){
  *{animation:none !important;transition:none !important;}
}
</style>
</head>
<body>

<!-- ①スタート画面 -->
<main class="card" id="startCard">
  <span class="badge">🔮 診断・占いアプリ</span>
  <h1 class="title">ぜんぶいい日うらない🌈</h1>
  <p class="tagline">じゅんいは ありません。どの日も、いい日。</p>

  <label class="label" for="nameInput">🙋 なまえ（ニックネームOK）</label>
  <input id="nameInput" class="name-input" type="text" maxlength="12" placeholder="例：あゆみ" autocomplete="off" />
  <p class="error" id="nameError">🌸 なまえを入れてね</p>

  <span class="label">🕊️ きょうのお守りを ひとつえらんでね</span>
  <div class="charm-grid" id="charmGrid"></div>
  <p class="error" id="charmError">🌸 お守りをえらんでね</p>

  <button class="go-btn" id="goBtn">🌈 きょうの日をみる</button>

  <p class="credit">✨ アプリのアイデア：あゆみさん ✨<small>🤖 このアプリは生成AIといっしょに作りました</small></p>
</main>

<!-- ②さがしている画面 -->
<main class="card hidden" id="loadingCard">
  <div class="loading-emoji" id="loadingEmoji">🕊️</div>
  <p class="loading-text">きょうの「いい日」をさがしているよ<span class="dots"><span>.</span><span>.</span><span>.</span></span></p>
</main>

<!-- ③結果画面 -->
<main class="card hidden" id="resultCard">
  <p class="result-date" id="resultDate"></p>
  <h2 class="result-name" id="resultName"></h2>

  <div class="theme-badge" id="themeBadge"></div>
  <p class="fortune-msg" id="fortuneMsg"></p>

  <div class="hint-box">
    <p class="box-label">🌱 きょうの ちいさなヒント</p>
    <p class="box-text" id="hintText"></p>
  </div>

  <div class="charm-box">
    <p class="box-label" id="charmLabel">🕊️ お守りからの ひとこと</p>
    <p class="box-text" id="charmText"></p>
  </div>

  <div class="lucky-row">
    <div class="lucky-box">
      <p class="lucky-label">🎁 ラッキーアイテム</p>
      <p class="lucky-value" id="luckyItem"></p>
    </div>
    <div class="lucky-box">
      <p class="lucky-label">🎨 ラッキーカラー</p>
      <p class="lucky-value"><span class="color-dot" id="colorDot"></span><span id="luckyColor"></span></p>
    </div>
  </div>

  <p class="philosophy">🌷 この占いに、じゅんいはありません。<br>きょうも、あなたの「いい日」です。</p>

  <button class="go-btn again" id="againBtn">🔁 もういちど みる</button>

  <p class="credit">✨ アプリのアイデア：あゆみさん ✨<small>🤖 このアプリは生成AIといっしょに作りました</small></p>
</main>

<script>
"use strict";

/* ===== データ =====
   ポイント：「大吉・凶」みたいなランクや点数は使わない。
   10この「〇〇の日」は ぜんぶ同じ確率・ぜんぶ同格。優劣なし！ */

const THEMES = [
  { emoji:"💡", name:"ひらめきの日", bg:"#FFF3B0",
    msgs:["ふとした瞬間に、いいアイデアがふわっとわいてくる日。メモのじゅんびをしておこう📝",
          "「こうしたら楽しいかも！」のひらめきが、きょうのあなたの味方だよ"] },
  { emoji:"🌿", name:"ゆったりの日", bg:"#DCF5E3",
    msgs:["いそがなくてだいじょうぶ。ゆっくりのペースが、きょうのあなたにぴったりだよ",
          "ひとやすみも、だいじな時間。のんびりすごすほど、心がととのう日"] },
  { emoji:"🎈", name:"わくわくの日", bg:"#FFE0E9",
    msgs:["あたらしいことが、いつもより楽しく感じられる日。気になることをのぞいてみよう",
          "ちいさな「はじめて」が、きょうをもっと楽しくしてくれるよ"] },
  { emoji:"🍀", name:"やさしさの日", bg:"#DFF6EC",
    msgs:["人にも、じぶんにも、やさしくできる日。その気もちは、ちゃんとつたわるよ",
          "「だいじょうぶ？」のひとことが、だれかの心をあたためる日"] },
  { emoji:"✨", name:"きらきらの日", bg:"#FFF0C9",
    msgs:["あなたのいいところが、自然とかがやく日。いつもどおりで、じゅうぶんだよ",
          "がんばってきたことが、きらっと光る瞬間がありそう✨"] },
  { emoji:"☀️", name:"ぽかぽかの日", bg:"#FFE8D1",
    msgs:["心があったかくなる出来事に出会えそうな日。あったかいものを食べるのもおすすめ",
          "日だまりみたいに、おだやかな気もちですごせる日だよ"] },
  { emoji:"☁️", name:"ふんわりの日", bg:"#EAF4FF",
    msgs:["力をぬくと、うまくいく日。かんぺきじゃなくて、ちょうどいい",
          "ふわっとかまえて、流れにのってみよう。きょうは、それがいちばん"] },
  { emoji:"💖", name:"ときめきの日", bg:"#FFDCE9",
    msgs:["「すき！」と思えるものに出会えそうな日。アンテナを立てておこう",
          "お気に入りの何かが、きょうのあなたを元気にしてくれるよ"] },
  { emoji:"🌱", name:"すくすくの日", bg:"#E4F7D9",
    msgs:["きのうより、ほんのちょっと成長できる日。ちいさな一歩でOK🌱",
          "つみかさねてきたことが、芽を出しはじめる日。あせらなくてだいじょうぶ"] },
  { emoji:"🎵", name:"るんるんの日", bg:"#EDE4FF",
    msgs:["すきな音楽が、きょうのあなたのパワーになる日🎵",
          "ハミングしたくなるような、かろやかな一日になりそう"] },
];

// きょうのお守り（えらぶと、ひとことがもらえる）
const CHARMS = [
  { emoji:"🍀", name:"よつば", line:"きみのそばに、ちいさな幸せがかくれているよ" },
  { emoji:"🌸", name:"さくら", line:"あたらしい一歩に、そっとエールをおくるよ" },
  { emoji:"⭐", name:"ほし",   line:"まよったら、じぶんの「すき」をえらんでね" },
  { emoji:"🌙", name:"つき",   line:"がんばったぶん、ちゃんと休むのもだいじだよ" },
  { emoji:"🎀", name:"リボン", line:"だれかとのつながりが、きょうのちからになるよ" },
  { emoji:"🌈", name:"にじ",   line:"みんなちがって、みんないい。きみの色でいこう" },
];

const HINTS = [
  "あたたかいのみものを、ゆっくりのんでみて",
  "そらを10びょうだけ、みあげてみて",
  "すきな曲を1曲、きいてみて",
  "「ありがとう」をひとつ、つたえてみて",
  "ふかこきゅうを、3回してみて",
  "きょうのじぶんに、まるをつけてあげて",
  "たからものを1つ、ながめてみて",
  "ちょっとだけ、せのびをしてみて",
  "すきなにおいを、かいでみて",
  "あしたのちいさな楽しみを、1つきめてみて",
];

const LUCKY_ITEMS = [
  "ふわふわのハンカチ","まるいあめ","おきにいりのペン","ちいさなぬいぐるみ",
  "あったかいココア","きれいな色のマスキングテープ","おまもり","すきな本のしおり",
  "もこもこのくつした","いいにおいのせっけん","まんまるのボタン","おほしさまのシール",
];

const LUCKY_COLORS = [
  { name:"さくらいろ",     css:"#FFD1DC" },
  { name:"そらいろ",       css:"#BDE0FE" },
  { name:"ミントグリーン", css:"#B8F2E6" },
  { name:"レモンイエロー", css:"#FFF3B0" },
  { name:"ラベンダー",     css:"#CDB4DB" },
  { name:"ももいろ",       css:"#FFC8DD" },
  { name:"みかんいろ",     css:"#FFD8A8" },
  { name:"うみいろ",       css:"#A2D2FF" },
  { name:"わたゆきいろ",   css:"#FFFDF7" },
  { name:"よもぎいろ",     css:"#CDEAC0" },
];

/* ===== おなじ日・おなじ入力なら、おなじ結果が出るしくみ =====
   「なまえ × お守り × 日付」から数字のタネ（シード）を作って乱数にする。
   だから1日のあいだは結果が変わらない＝占いっぽい！ */
function makeSeed(str){
  let h = 1779033703 ^ str.length;
  for (let i = 0; i < str.length; i++){
    h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
    h = (h << 13) | (h >>> 19);
  }
  h = Math.imul(h ^ (h >>> 16), 2246822507);
  h = Math.imul(h ^ (h >>> 13), 3266489909);
  return (h ^= h >>> 16) >>> 0;
}
function makeRng(seed){
  return function(){
    seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
const pick = (rng, arr) => arr[Math.floor(rng() * arr.length)];  // ぜんぶ同じ確率！

/* ===== 画面の部品 ===== */
const $ = (id) => document.getElementById(id);
const startCard = $("startCard"), loadingCard = $("loadingCard"), resultCard = $("resultCard");
let selectedCharm = null;

// お守りボタンをならべる
const charmGrid = $("charmGrid");
CHARMS.forEach((c, i) => {
  const btn = document.createElement("button");
  btn.className = "charm-btn";
  btn.type = "button";
  btn.innerHTML = `<span class="emoji">${c.emoji}</span><span class="name">${c.name}</span>`;
  btn.addEventListener("click", () => {
    selectedCharm = i;
    document.querySelectorAll(".charm-btn").forEach(b => b.classList.remove("selected"));
    btn.classList.add("selected");
    $("charmError").classList.remove("show");
  });
  charmGrid.appendChild(btn);
});

// 背景にただよう絵文字をばらまく
const BG_EMOJIS = ["🌸","☁️","⭐","🎈","🍀","🫧","🌈","💛","🕊️","✨"];
BG_EMOJIS.forEach((e) => {
  const s = document.createElement("span");
  s.className = "float-emoji";
  s.textContent = e;
  s.style.left = (5 + Math.random() * 88) + "vw";
  s.style.top = (4 + Math.random() * 88) + "vh";
  s.style.fontSize = (18 + Math.random() * 15) + "px";
  s.style.setProperty("--dur", (7 + Math.random() * 5) + "s");
  s.style.animationDelay = (-Math.random() * 7) + "s";
  document.body.appendChild(s);
});

/* ===== きょうの日をみる ===== */
function divine(){
  const name = $("nameInput").value.trim();

  // 入力チェック
  let ok = true;
  if (!name){
    $("nameError").classList.add("show");
    $("nameInput").classList.add("shake");
    setTimeout(() => $("nameInput").classList.remove("shake"), 450);
    ok = false;
  }
  if (selectedCharm === null){
    $("charmError").classList.add("show");
    charmGrid.classList.add("shake");
    setTimeout(() => charmGrid.classList.remove("shake"), 450);
    ok = false;
  }
  if (!ok) return;
  $("nameError").classList.remove("show");

  const charm = CHARMS[selectedCharm];

  // シード作成 → 乱数準備
  const d = new Date();
  const dateKey = `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
  const rng = makeRng(makeSeed(`${name}|${charm.name}|${dateKey}`));

  // 結果を決める（ぜんぶ同じ確率でえらぶだけ。優劣なし）
  const theme = pick(rng, THEMES);
  const msg   = pick(rng, theme.msgs);
  const hint  = pick(rng, HINTS);
  const item  = pick(rng, LUCKY_ITEMS);
  const color = pick(rng, LUCKY_COLORS);

  // さがしている画面へ
  startCard.classList.add("hidden");
  $("loadingEmoji").textContent = charm.emoji;
  loadingCard.classList.remove("hidden");
  window.scrollTo({ top: 0 });

  setTimeout(() => showResult({ name, charm, theme, msg, hint, item, color, d }), 1700);
}

/* ===== 結果を表示 ===== */
function showResult(r){
  loadingCard.classList.add("hidden");

  const WEEK = ["日","月","火","水","木","金","土"];
  $("resultDate").textContent = `${r.d.getFullYear()}年${r.d.getMonth() + 1}月${r.d.getDate()}日（${WEEK[r.d.getDay()]}）`;
  $("resultName").textContent = `${r.name}さんの きょうは…`;

  const badge = $("themeBadge");
  badge.textContent = `${r.theme.emoji} ${r.theme.name} ${r.theme.emoji}`;
  badge.style.background = r.theme.bg;
  // アニメーションをかけ直すためのリセット
  badge.style.animation = "none";
  void badge.offsetWidth;
  badge.style.animation = "";

  $("fortuneMsg").textContent = r.msg;
  $("hintText").textContent = r.hint;
  $("charmLabel").textContent = `${r.charm.emoji} お守り「${r.charm.name}」からの ひとこと`;
  $("charmText").textContent = r.charm.line;
  $("luckyItem").textContent = r.item;
  $("luckyColor").textContent = r.color.name;
  $("colorDot").style.background = r.color.css;

  resultCard.classList.remove("hidden");
  window.scrollTo({ top: 0 });

  // 🌸 お祝い演出（はなびらとキラキラが、ゆっくりふってくる）
  celebrate();
}

/* ===== はなびらのお祝い ===== */
function celebrate(){
  const emojis = ["🌸","✨","💛","☁️","🫧","🎀","🌷"];
  for (let i = 0; i < 55; i++){
    const s = document.createElement("span");
    s.className = "confetti";
    s.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    s.style.left = Math.random() * 100 + "vw";
    s.style.fontSize = (12 + Math.random() * 14) + "px";
    s.style.animationDuration = (3.6 + Math.random() * 2.8) + "s";  // ゆっくりめ
    s.style.animationDelay = (Math.random() * 1.2) + "s";
    document.body.appendChild(s);
    s.addEventListener("animationend", () => s.remove());
    setTimeout(() => s.remove(), 9000); // 保険
  }
}

/* ===== ボタンの動き ===== */
$("goBtn").addEventListener("click", divine);
$("nameInput").addEventListener("keydown", (e) => { if (e.key === "Enter") divine(); });
$("againBtn").addEventListener("click", () => {
  resultCard.classList.add("hidden");
  startCard.classList.remove("hidden");
  window.scrollTo({ top: 0 });
});
</script>
